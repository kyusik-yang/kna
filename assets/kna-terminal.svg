<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg"
     font-family="'SFMono-Regular','Consolas','Liberation Mono',monospace">

  <!-- ── Window chrome ── -->
  <rect width="680" height="520" rx="12" fill="#181818" stroke="#404040" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="680" height="40" rx="12" fill="#2C2C2E"/>
  <rect x="0" y="28" width="680" height="12" fill="#2C2C2E"/>
  <line x1="0" y1="40" x2="680" y2="40" stroke="#444444" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="5.5" fill="#FF5F57"/>
  <circle cx="40" cy="20" r="5.5" fill="#FEBC2E"/>
  <circle cx="60" cy="20" r="5.5" fill="#28C840"/>

  <!-- Window title -->
  <text x="340" y="26" text-anchor="middle" font-size="12" fill="#6B7280">zsh — kna info</text>

  <!-- ── Shell prompt ── -->
  <text x="16" y="62" font-size="11">
    <tspan fill="#28C840">❯</tspan>
    <tspan fill="#A0A0A0"> kna info</tspan>
  </text>

  <!-- ── Header ── -->
  <text x="16" y="88" font-size="12.5" font-weight="700" fill="#A56EF0">Korean National Assembly Database</text>
  <line x1="16" y1="96" x2="660" y2="96" stroke="#333" stroke-width="0.5"/>

  <!-- ── Table header ── -->
  <text x="16"  y="114" font-size="10" fill="#888" font-weight="700">Assembly</text>
  <text x="220" y="114" font-size="10" fill="#888" font-weight="700" text-anchor="end">Bills</text>
  <text x="310" y="114" font-size="10" fill="#888" font-weight="700" text-anchor="end">Enacted</text>
  <line x1="16" y1="120" x2="330" y2="120" stroke="#333" stroke-width="0.5"/>

  <!-- ── Table rows ── -->
  <text x="16"  y="136" font-size="10" fill="#ccc">17th (2004-08)</text>
  <text x="220" y="136" font-size="10" fill="#ccc" text-anchor="end">8,369</text>
  <text x="310" y="136" font-size="10" fill="#777" text-anchor="end">2,547</text>

  <text x="16"  y="152" font-size="10" fill="#ccc">18th (2008-12)</text>
  <text x="220" y="152" font-size="10" fill="#ccc" text-anchor="end">14,762</text>
  <text x="310" y="152" font-size="10" fill="#777" text-anchor="end">2,930</text>

  <text x="16"  y="168" font-size="10" fill="#ccc">19th (2012-16)</text>
  <text x="220" y="168" font-size="10" fill="#ccc" text-anchor="end">18,735</text>
  <text x="310" y="168" font-size="10" fill="#777" text-anchor="end">3,414</text>

  <text x="16"  y="184" font-size="10" fill="#ccc">20th (2016-20)</text>
  <text x="220" y="184" font-size="10" fill="#ccc" text-anchor="end">24,996</text>
  <text x="310" y="184" font-size="10" fill="#777" text-anchor="end">3,794</text>

  <text x="16"  y="200" font-size="10" fill="#ccc">21st (2020-24)</text>
  <text x="220" y="200" font-size="10" fill="#ccc" text-anchor="end">26,711</text>
  <text x="310" y="200" font-size="10" fill="#777" text-anchor="end">3,554</text>

  <text x="16"  y="216" font-size="10" fill="#ccc">22nd (2024-)</text>
  <text x="220" y="216" font-size="10" fill="#ccc" text-anchor="end">17,205</text>
  <text x="310" y="216" font-size="10" fill="#777" text-anchor="end">1,399</text>

  <line x1="16" y1="224" x2="330" y2="224" stroke="#333" stroke-width="0.5"/>
  <text x="16"  y="240" font-size="10.5" fill="#FFFFFF" font-weight="700">Total</text>
  <text x="220" y="240" font-size="10.5" fill="#FFFFFF" font-weight="700" text-anchor="end">110,778</text>
  <text x="310" y="240" font-size="10.5" fill="#FFFFFF" font-weight="700" text-anchor="end">17,638</text>

  <!-- ── Stats summary (right side, stacked) ── -->
  <text x="380" y="136" font-size="10">
    <tspan fill="#A56EF0">●</tspan>
    <tspan fill="#888"> Roll call votes</tspan>
    <tspan fill="#FFFFFF" font-weight="700">  2,425,113</tspan>
  </text>
  <text x="380" y="156" font-size="10">
    <tspan fill="#A56EF0">●</tspan>
    <tspan fill="#888"> Ideal points</tspan>
    <tspan fill="#FFFFFF" font-weight="700">  936</tspan>
    <tspan fill="#555">  DW-NOMINATE</tspan>
  </text>
  <text x="380" y="176" font-size="10">
    <tspan fill="#A56EF0">●</tspan>
    <tspan fill="#888"> Committee mtgs</tspan>
    <tspan fill="#FFFFFF" font-weight="700">  572,127</tspan>
  </text>
  <text x="380" y="196" font-size="10">
    <tspan fill="#A56EF0">●</tspan>
    <tspan fill="#888"> Bill texts</tspan>
    <tspan fill="#FFFFFF" font-weight="700">  60,925</tspan>
    <tspan fill="#555">  propose-reason</tspan>
  </text>
  <text x="380" y="216" font-size="10">
    <tspan fill="#A56EF0">●</tspan>
    <tspan fill="#888"> Coverage</tspan>
    <tspan fill="#FFFFFF" font-weight="700">  17th-22nd</tspan>
    <tspan fill="#555">  (2004-2026)</tspan>
  </text>

  <!-- ── Separator ── -->
  <line x1="16" y1="260" x2="660" y2="260" stroke="#333" stroke-width="0.5"/>

  <!-- ── Second command: kna show ── -->
  <text x="16" y="282" font-size="11">
    <tspan fill="#28C840">❯</tspan>
    <tspan fill="#A0A0A0"> kna show 2201837</tspan>
  </text>

  <!-- Bill info -->
  <text x="16" y="306" font-size="12" font-weight="700" fill="#FFFFFF">관광진흥법 일부개정법률안</text>
  <text x="16" y="324" font-size="10">
    <tspan fill="#555">committee</tspan>
    <tspan fill="#ccc">   문화체육관광위원회</tspan>
  </text>
  <text x="16" y="340" font-size="10">
    <tspan fill="#555">status</tspan>
    <tspan fill="#00BCD4">      대안반영폐기</tspan>
  </text>

  <!-- ── Lifecycle timeline ── -->
  <text x="16" y="364" font-size="10" fill="#888" font-weight="700">LIFECYCLE</text>
  <text x="200" y="364" font-size="10" fill="#888" font-weight="700">date</text>
  <text x="300" y="364" font-size="10" fill="#888" font-weight="700" text-anchor="end">days</text>

  <!-- Stage rows -->
  <text x="16" y="382" font-size="10">
    <tspan fill="#28C840">●</tspan>
    <tspan fill="#ccc"> 발의</tspan>
  </text>
  <text x="200" y="382" font-size="10" fill="#ccc">2024-07-17</text>
  <text x="300" y="382" font-size="10" fill="#555" text-anchor="end">-</text>

  <text x="16" y="398" font-size="10">
    <tspan fill="#28C840">●</tspan>
    <tspan fill="#ccc"> 소관위 회부</tspan>
  </text>
  <text x="200" y="398" font-size="10" fill="#ccc">2024-07-18</text>
  <text x="300" y="398" font-size="10" fill="#A56EF0" text-anchor="end">+1</text>

  <text x="16" y="414" font-size="10">
    <tspan fill="#28C840">●</tspan>
    <tspan fill="#ccc"> 소관위 상정</tspan>
  </text>
  <text x="200" y="414" font-size="10" fill="#ccc">2024-08-26</text>
  <text x="300" y="414" font-size="10" fill="#A56EF0" text-anchor="end">+40</text>

  <text x="16" y="430" font-size="10">
    <tspan fill="#28C840">●</tspan>
    <tspan fill="#ccc"> 소관위 처리</tspan>
  </text>
  <text x="200" y="430" font-size="10" fill="#ccc">2024-09-05</text>
  <text x="300" y="430" font-size="10" fill="#A56EF0" text-anchor="end">+50</text>

  <text x="16" y="446" font-size="10">
    <tspan fill="#555">○</tspan>
    <tspan fill="#555"> 법사위 회부</tspan>
  </text>
  <text x="200" y="446" font-size="10" fill="#444">--</text>

  <text x="16" y="462" font-size="10">
    <tspan fill="#28C840">●</tspan>
    <tspan fill="#ccc"> 본회의 의결</tspan>
  </text>
  <text x="200" y="462" font-size="10" fill="#ccc">2024-09-26</text>
  <text x="300" y="462" font-size="10" fill="#A56EF0" text-anchor="end">+71</text>

  <text x="16" y="478" font-size="10">
    <tspan fill="#555">○</tspan>
    <tspan fill="#555"> 공포</tspan>
  </text>
  <text x="200" y="478" font-size="10" fill="#444">--</text>

  <!-- ── Available commands (bottom) ── -->
  <line x1="16" y1="492" x2="660" y2="492" stroke="#333" stroke-width="0.5"/>
  <text x="16" y="508" font-size="9.5">
    <tspan fill="#555">commands:</tspan>
    <tspan fill="#A56EF0"> info</tspan>
    <tspan fill="#444"> · </tspan>
    <tspan fill="#A56EF0">search</tspan>
    <tspan fill="#444"> · </tspan>
    <tspan fill="#A56EF0">text</tspan>
    <tspan fill="#444"> · </tspan>
    <tspan fill="#A56EF0">show</tspan>
    <tspan fill="#444"> · </tspan>
    <tspan fill="#A56EF0">legislator</tspan>
    <tspan fill="#444"> · </tspan>
    <tspan fill="#A56EF0">stats</tspan>
    <tspan fill="#444"> · </tspan>
    <tspan fill="#A56EF0">export</tspan>
    <tspan fill="#555">           pip install -e .</tspan>
  </text>

</svg>
